---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: configurationapplies.machine.talos.crossplane.io
spec:
  group: machine.talos.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - talos
    kind: ConfigurationApply
    listKind: ConfigurationApplyList
    plural: configurationapplies
    singular: configurationapply
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A ConfigurationApply applies machine configuration to Talos nodes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A ConfigurationApplySpec defines the desired state of a ConfigurationApply.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: ConfigurationApplyParameters are the configurable fields
                  of a ConfigurationApply.
                properties:
                  applyMode:
                    description: ApplyMode is the configuration application mode (optional)
                    enum:
                    - auto
                    - reboot
                    - no_reboot
                    - staged
                    type: string
                  clientConfiguration:
                    description: ClientConfiguration for authentication
                    properties:
                      caCertificate:
                        description: CACertificate is the CA certificate for the cluster
                        type: string
                      clientCertificate:
                        description: ClientCertificate is the client certificate for
                          authentication
                        type: string
                      clientKey:
                        description: ClientKey is the client private key for authentication
                        type: string
                    required:
                    - caCertificate
                    - clientCertificate
                    - clientKey
                    type: object
                  configPatches:
                    description: ConfigPatches is a list of configuration modifications
                      (optional)
                    items:
                      type: string
                    type: array
                  endpoint:
                    description: Endpoint is the machine endpoint (optional)
                    type: string
                  machineConfiguration:
                    description: MachineConfiguration defines the Talos machine configuration
                      to apply
                    properties:
                      cluster:
                        description: Cluster configuration
                        properties:
                          ca:
                            description: CA defines the Kubernetes CA configuration
                              (optional)
                            properties:
                              crt:
                                description: Crt is the PEM-encoded certificate
                                type: string
                              key:
                                description: Key is the PEM-encoded private key (optional)
                                type: string
                            required:
                            - crt
                            type: object
                          clusterName:
                            description: ClusterName is the name of the cluster
                            type: string
                          controlPlane:
                            description: ControlPlane defines control plane configuration
                            properties:
                              endpoint:
                                description: Endpoint is the control plane endpoint
                                  URL
                                type: string
                            required:
                            - endpoint
                            type: object
                          id:
                            description: ID is the cluster unique identifier
                            type: string
                          network:
                            description: Network defines cluster networking
                            properties:
                              dnsDomain:
                                description: DNSDomain is the cluster DNS domain
                                type: string
                              podSubnets:
                                description: PodSubnets are the pod network CIDRs
                                items:
                                  type: string
                                type: array
                              serviceSubnets:
                                description: ServiceSubnets are the service network
                                  CIDRs
                                items:
                                  type: string
                                type: array
                            type: object
                          secret:
                            description: Secret is the cluster shared secret
                            type: string
                          token:
                            description: Token for cluster bootstrap
                            type: string
                        required:
                        - clusterName
                        - controlPlane
                        - id
                        - network
                        - secret
                        - token
                        type: object
                      machine:
                        description: Machine configuration
                        properties:
                          ca:
                            description: CA defines the certificate authority configuration
                              (optional)
                            properties:
                              crt:
                                description: Crt is the PEM-encoded certificate
                                type: string
                              key:
                                description: Key is the PEM-encoded private key (optional)
                                type: string
                            required:
                            - crt
                            type: object
                          features:
                            description: Features configuration (optional)
                            properties:
                              rbac:
                                description: RBAC enables role-based access control
                                type: boolean
                            type: object
                          install:
                            description: Install configuration for the machine
                            properties:
                              disk:
                                description: Disk is the target disk for installation
                                type: string
                              image:
                                description: Image is the Talos installer image
                                type: string
                              wipe:
                                description: Wipe indicates whether to wipe the disk
                                type: boolean
                            required:
                            - disk
                            - image
                            type: object
                          kubelet:
                            description: Kubelet configuration (optional)
                            properties:
                              image:
                                description: Image is the kubelet image
                                type: string
                            type: object
                          network:
                            description: Network configuration (optional)
                            type: object
                          token:
                            description: Token for machine authentication
                            type: string
                          type:
                            description: Type is the machine type (controlplane, worker)
                            enum:
                            - controlplane
                            - worker
                            type: string
                        required:
                        - install
                        - token
                        - type
                        type: object
                      version:
                        description: Version is the Talos configuration version (e.g.,
                          v1alpha1)
                        type: string
                    required:
                    - cluster
                    - machine
                    - version
                    type: object
                  machineConfigurationRef:
                    description: MachineConfigurationRef references raw Talos machine
                      configuration bytes in a Secret.
                    properties:
                      key:
                        description: Key is the data key containing the value.
                        type: string
                      name:
                        description: Name is the name of the Secret.
                        type: string
                      namespace:
                        description: Namespace is the namespace of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  node:
                    description: Node is the target machine identifier (required)
                    type: string
                  onDestroy:
                    description: OnDestroy configuration for machine reset during
                      destruction (optional)
                    type: string
                required:
                - clientConfiguration
                - node
                type: object
                x-kubernetes-validations:
                - message: machineConfigurationRef or machineConfiguration must be
                    set
                  rule: has(self.machineConfigurationRef) || has(self.machineConfiguration)
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              publishConnectionDetailsTo:
                description: |-
                  PublishConnectionDetailsTo specifies the connection secret config which
                  contains a name, metadata and a reference to secret store config to
                  which any connection details for this managed resource should be written.
                  Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  configRef:
                    default:
                      name: default
                    description: |-
                      SecretStoreConfigRef specifies which secret store config should be used
                      for this ConnectionSecret.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  metadata:
                    description: Metadata is the metadata for connection secret.
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: |-
                          Annotations are the annotations to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.annotations".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels are the labels/tags to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.labels".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      type:
                        description: |-
                          Type is the SecretType for the connection secret.
                          - Only valid for Kubernetes Secret Stores.
                        type: string
                    type: object
                  name:
                    description: Name is the name of the connection secret.
                    type: string
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                  This field is planned to be replaced in a future release in favor of
                  PublishConnectionDetailsTo. Currently, both could be set independently
                  and connection details would be published to both without affecting
                  each other.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A ConfigurationApplyStatus represents the observed state
              of a ConfigurationApply.
            properties:
              atProvider:
                description: ConfigurationApplyObservation are the observable fields
                  of a ConfigurationApply.
                properties:
                  applied:
                    description: Applied indicates if the configuration was successfully
                      applied
                    type: boolean
                  lastAppliedTime:
                    description: LastAppliedTime is the timestamp of the last successful
                      application
                    format: date-time
                    type: string
                  lastStateCheck:
                    description: LastStateCheck is the timestamp of the last state
                      verification
                    format: date-time
                    type: string
                  machineState:
                    description: MachineState indicates the current state of the machine
                      (MaintenanceMode, Configured, Unreachable)
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
